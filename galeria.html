<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Galería - El Sueño de una Futbolista</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background-color: #f5f5f5;
      color: #333;
    }

    nav a.active {
      color: #fff;
      background-color: #e91e63;
      padding: 8px 12px;
      border-radius: 6px;
    }

    header {
      background-color: #e91e63;
      color: white;
      padding: 40px 20px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 2.4em;
    }

    .container {
      max-width: 1000px;
      margin: 30px auto;
      padding: 0 20px;
    }

    h2 {
      border-bottom: 2px solid #e91e63;
      padding-bottom: 6px;
      margin-top: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .grid img {
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.15);
      transition: transform 0.3s ease;
    }

    .grid img:hover {
      transform: scale(1.05);
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #888;
      font-size: 0.9em;
    }
  </style>
</head>

    <a href="historia.html" style="margin: 0 12px; text-decoration:none; color:#e91e63; font-weight:bold;">Historia</a>
    <a href="sobre.html" style="margin: 0 12px; text-decoration:none; color:#e91e63; font-weight:bold;">Sobre</a>
  </nav>

  <header>
    <h1>Galería de Cayetana</h1>
    <p>Fotos y momentos de cada temporada</p>
  </header>

  <div class="container">
    <h2>📸 Temporada 2024</h2>
    <div class="grid">
      <img src="images/2024/2024_Capitana.jpg" alt="Cayetana como capitana" />
