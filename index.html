  <button id="toTop" title="Volver arriba">🔝</button>

  <script>
    // Mostrar el botón al hacer scroll hacia abajo
    window.addEventListener("scroll", function () {
      const toTop = document.getElementById("toTop");
      if (window.scrollY > 300) {
        toTop.style.display = "block";
      } else {
        toTop.style.display = "none";
      }
    });
  
    // Subir arriba al hacer clic
    document.getElementById("toTop").addEventListener("click", function () {
      window.scrollTo({
        top: 0,
        behavior: "smooth"
      });
    });
  </script>
  <script>
    // Cierra el menú móvil al hacer clic en una opción
    document.querySelectorAll('.menu-contenedor a').forEach(enlace => {
      enlace.addEventListener('click', () => {
        const checkbox = document.getElementById('menu-toggle');
        if (checkbox.checked) {
          checkbox.checked = false;
        }
      });
    });
  </script>
