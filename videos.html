  <link rel="stylesheet" href="estilos.css">
  <style>
    .videos-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 2rem;
      padding: 2rem;
    }

    .video-box {
      background-color: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
    }

    .video-box:hover {
      transform: translateY(-5px);
    }

    .video-box iframe {
      width: 100%;
      height: 200px;
      display: block;
    }

    .video-title {
      padding: 1rem;
      font-weight: bold;
      text-align: center;
      font-size: 1rem;
      background-color: #f9f9f9;
    }

    main h1 {
      text-align: center;
      margin-top: 2rem;
      font-size: 2rem;
    }
  </style>
</head>
